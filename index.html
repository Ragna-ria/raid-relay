<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>レイドでつなぐ生誕祭</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <!-- タイトル -->
        <h1 class="title">
            レイドでつなぐ生誕祭
        </h1>

        <!-- LIVE -->
        <div class="live">
            🔴 LIVE NOW
        </div>

        <!-- 現在の走者 -->
        <div class="current">

            <span class="label">
                現在の走者
            </span>

            <span
                id="currentName"
                class="current-name">

                読み込み中...

            </span>

        </div>

        <!-- Twitch Player -->
        <div id="playerArea"></div>

        <!-- 次の走者 -->
        <div class="next">

            <span class="label">
                次の走者
            </span>

            <span
                id="nextName"
                class="next-name">

                未定

            </span>

        </div>

        <!-- 進行状況（小さく表示） -->
        <div class="progress">

            <span id="progressText">
                -
            </span>

        </div>

    </div>

    <script src="https://player.twitch.tv/js/embed/v1.js"></script>

    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
