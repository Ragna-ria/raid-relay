<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>レイドリレー</title>

<style>
body{
    margin:0;
    background:#18181b;
    color:white;
    font-family:sans-serif;
}

header{
    background:#9147ff;
    padding:15px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.info{
    padding:20px;
    text-align:center;
}

#currentName{
    font-size:40px;
    font-weight:bold;
}

#nextName{
    font-size:24px;
    color:#cccccc;
}

iframe{
    display:block;
    width:100%;
    height:720px;
    border:none;
}
</style>
</head>

<body>

<header>
レイドリレー
</header>

<div class="info">
<div>現在の配信者</div>
<div id="currentName">読み込み中...</div>

<br>

<div>次の配信者</div>
<div id="nextName">未定</div>
</div>

<iframe
id="player"
allowfullscreen>
</iframe>

<script>

let currentChannel="";

async function loadData(){

    const res=await fetch("current.json?"+Date.now());
    const data=await res.json();

    document.getElementById("currentName").textContent=data.currentName;
    document.getElementById("nextName").textContent=data.nextName || "未定";

    if(currentChannel!==data.channel){

        currentChannel=data.channel;

        document.getElementById("player").src=
        `https://player.twitch.tv/?channel=${data.channel}&parent=ragna-ria.github.io`;

    }

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
